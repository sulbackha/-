<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>조 추첨</title>

<style>
body{
font-family:sans-serif;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:700px;
}

h1{
font-size:50px;
margin-bottom:30px;
}

textarea{
width:100%;
height:150px;
font-size:18px;
margin-bottom:20px;
}

input{
font-size:20px;
width:80px;
}

button{
font-size:22px;
padding:12px 25px;
margin-top:15px;
cursor:pointer;
}

#result{
margin-top:40px;
font-size:28px;
}
</style>

</head>

<body>

<div class="container">

<h1>조 추첨 🎲</h1>

<h3>1학년</h3>
<textarea id="g1" placeholder="1학년 이름 한 줄씩"></textarea>

<h3>2학년</h3>
<textarea id="g2" placeholder="2학년 이름 한 줄씩"></textarea>

조 수 :
<input type="number" id="groups" value="4">

<br><br>

<button onclick="draw()">조 추첨!</button>

<div id="result"></div>

</div>

<script>

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

function draw(){

let g1=document.getElementById("g1").value.split("\n").filter(n=>n.trim()!=="");
let g2=document.getElementById("g2").value.split("\n").filter(n=>n.trim()!=="");

let groupCount=Number(document.getElementById("groups").value);

let total=g1.length+g2.length;

if(total < groupCount*5){
alert("모든 조에 최소 5명을 배치할 수 없습니다.");
return;
}

shuffle(g1);
shuffle(g2);

let groups=[];
for(let i=0;i<groupCount;i++){
groups.push([]);
}

// 학년 균등 분배
for(let i=0;i<g1.length;i++){
groups[i % groupCount].push(g1[i]);
}

for(let i=0;i<g2.length;i++){
groups[i % groupCount].push(g2[i]);
}

// 최소 5명 보장
let people=[];
groups.forEach(g=>people.push(...g));
shuffle(people);

groups=[];
for(let i=0;i<groupCount;i++){
groups.push([]);
}

for(let i=0;i<groupCount;i++){
for(let j=0;j<5;j++){
groups[i].push(people.pop());
}
}

// 남은 인원 랜덤 추가
while(people.length){
let r=Math.floor(Math.random()*groupCount);
groups[r].push(people.pop());
}

let result="";

for(let i=0;i<groups.length;i++){
shuffle(groups[i]);
result+="<h2>"+(i+1)+"조 ("+groups[i].length+"명)</h2>"+groups[i].join(", ")+"<br><br>";
}

document.getElementById("result").innerHTML=result;

}

</script>

</body>
</html>
