<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>조 추첨</title>

<style>
body{
font-family:sans-serif;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:700px;
}

h1{
font-size:50px;
margin-bottom:30px;
}

textarea{
width:100%;
height:150px;
font-size:18px;
margin-bottom:20px;
}

input{
font-size:20px;
width:80px;
}

button{
font-size:22px;
padding:12px 25px;
margin-top:15px;
cursor:pointer;
}

#result{
margin-top:40px;
font-size:28px;
}
</style>

</head>

<body>

<div class="container">

<h1>조 추첨 🎲</h1>

<h3>1학년</h3>
<textarea id="g1" placeholder="1학년 이름 한 줄씩"></textarea>

<h3>2학년</h3>
<textarea id="g2" placeholder="2학년 이름 한 줄씩"></textarea>

조 수 :
<input type="number" id="groups" value="4">

<br><br>

<button onclick="draw()">조 추첨!</button>

<div id="result"></div>

</div>

<script>

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

function draw(){

let g1=document.getElementById("g1").value.split("\n").filter(n=>n.trim()!=="");
let g2=document.getElementById("g2").value.split("\n").filter(n=>n.trim()!=="");

let groupCount=Number(document.getElementById("groups").value);

shuffle(g1);
shuffle(g2);

let groups=[];
for(let i=0;i<groupCount;i++){
groups.push([]);
}

// 1학년 배치
for(let i=0;i<g1.length;i++){
groups[i % groupCount].push(g1[i]);
}

// 2학년 배치
for(let i=0;i<g2.length;i++){
groups[i % groupCount].push(g2[i]);
}

// 조 내부 랜덤
for(let i=0;i<groupCount;i++){
shuffle(groups[i]);
}

let result="";

for(let i=0;i<groups.length;i++){

let g1count=groups[i].filter(x=>g1.includes(x)).length;
let g2count=groups[i].length-g1count;

result+="<h2>"+(i+1)+"조 ("+groups[i].length+"명)</h2>";
result+=groups[i].join(", ");
result+="<br><small>1학년 "+g1count+" / 2학년 "+g2count+"</small><br><br>";

}

document.getElementById("result").innerHTML=result;

}

</script>

</body>
</html>
