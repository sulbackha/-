<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>조 추첨</title>

<style>
body{
    font-family: sans-serif;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container{
    width: 600px;
}

h1{
    font-size: 50px;
}

textarea{
    width: 100%;
    height: 200px;
    font-size: 20px;
}

input{
    font-size: 20px;
    width: 80px;
}

button{
    font-size: 22px;
    padding: 10px 20px;
    margin-top: 15px;
}

#result{
    margin-top: 30px;
    font-size: 28px;
}
</style>

</head>

<body>

<div class="container">

<h1>조 추첨 🎲</h1>

<textarea id="names" placeholder="이름 한 줄씩 입력"></textarea>

<br><br>

조 인원:
<input type="number" id="size" value="4">

<br><br>

<button onclick="draw()">조 추첨!</button>

<div id="result"></div>

</div>

<script>

function draw(){

let names = document.getElementById("names").value
.split("\n")
.filter(n => n.trim() !== "");

let size = Number(document.getElementById("size").value);

for(let i = names.length - 1; i > 0; i--){
let j = Math.floor(Math.random() * (i + 1));
[names[i], names[j]] = [names[j], names[i]];
}

let result = "";
let groupNum = 1;

for(let i = 0; i < names.length; i += size){

let group = names.slice(i, i + size);

result += "<h2>" + groupNum + "조</h2>" + group.join(", ") + "<br><br>";

groupNum++;
}

document.getElementById("result").innerHTML = result;

}

</script>

</body>
</html>
