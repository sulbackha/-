<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>조 추첨</title>

<style>
body{
font-family:sans-serif;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:700px;
}

h1{
font-size:50px;
margin-bottom:30px;
}

textarea{
width:100%;
height:150px;
font-size:18px;
margin-bottom:20px;
}

input{
font-size:20px;
width:80px;
}

button{
font-size:22px;
padding:12px 25px;
margin-top:15px;
cursor:pointer;
}

#result{
margin-top:40px;
font-size:28px;
}
</style>

</head>

<body>

<div class="container">

<h1>조 추첨 🎲</h1>

<h3>1학년</h3>
<textarea id="g1" placeholder="1학년 이름 한 줄씩"></textarea>

<h3>2학년</h3>
<textarea id="g2" placeholder="2학년 이름 한 줄씩"></textarea>

조 수 :
<input type="number" id="groups" value="4">

<br><br>

<button onclick="draw()">조 추첨!</button>

<div id="result"></div>

</div>

<script>

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

function draw(){

let g1=document.getElementById("g1").value.split("\n").filter(n=>n.trim()!=="");
let g2=document.getElementById("g2").value.split("\n").filter(n=>n.trim()!=="");

let groupCount=Number(document.getElementById("groups").value);

let total=g1.length+g2.length;

if(total < groupCount*5 || total > groupCount*6){
alert("현재 인원으로는 조당 5~6명 구성이 불가능합니다.");
return;
}

shuffle(g1);
shuffle(g2);

let groups=[];
for(let i=0;i<groupCount;i++){
groups.push([]);
}

// 목표 조 인원 계산
let sizes=new Array(groupCount).fill(5);
let extra=total-groupCount*5;

for(let i=0;i<extra;i++){
sizes[i]++;
}

shuffle(sizes);

// 학년 목표 분배
let g1PerGroup=Math.floor(g1.length/groupCount);
let g1Extra=g1.length%groupCount;

let g1Targets=[];

for(let i=0;i<groupCount;i++){
g1Targets.push(g1PerGroup+(i<g1Extra?1:0));
}

shuffle(g1Targets);

// 1학년 배치
for(let i=0;i<groupCount;i++){
for(let j=0;j<g1Targets[i];j++){
if(g1.length) groups[i].push(g1.pop());
}
}

// 2학년 채우기
for(let i=0;i<groupCount;i++){
while(groups[i].length < sizes[i]){
if(g2.length) groups[i].push(g2.pop());
}
}

let result="";

for(let i=0;i<groups.length;i++){
shuffle(groups[i]);
result+="<h2>"+(i+1)+"조 ("+groups[i].length+"명)</h2>"+groups[i].join(", ")+"<br><br>";
}

document.getElementById("result").innerHTML=result;

}

</script>

</body>
</html>
